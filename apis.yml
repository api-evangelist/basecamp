aid: basecamp
url: https://raw.githubusercontent.com/api-evangelist/basecamp/refs/heads/main/apis.yml
name: Basecamp
tags:
  - Collaboration
  - Project Management
  - REST
  - SaaS
  - Team Communication
modified: '2026-04-19'
description: >-
  Basecamp is a project management and team collaboration platform developed by 37signals.
  The Basecamp REST API (bc3-api) provides programmatic access to projects, to-do lists,
  messages, documents, schedules, and team members. OAuth2 authentication via the 37signals
  Launchpad is required. The API returns JSON and is documented on GitHub at
  github.com/basecamp/bc3-api.
apis:
  - aid: basecamp:basecamp-api
    name: Basecamp API
    tags:
      - Collaboration
      - Project Management
      - REST
      - Team Communication
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://3.basecampapi.com
    humanURL: https://github.com/basecamp/bc3-api
    properties:
      - url: https://github.com/basecamp/bc3-api
        type: Documentation
      - url: openapi/basecamp-api-openapi.yml
        type: OpenAPI
    description: >-
      The Basecamp API is a REST API providing programmatic access to Basecamp's
      project management platform. Manage projects, to-do lists, messages, documents,
      schedules, and team members. Uses OAuth 2.0 for authentication and returns JSON.
  - aid: basecamp:basecamp-webhooks
    name: Basecamp Webhooks
    tags:
      - Events
      - Notifications
      - Project Management
      - Webhooks
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://3.basecampapi.com
    humanURL: https://github.com/basecamp/bc3-api/blob/master/sections/webhooks.md
    properties:
      - url: https://github.com/basecamp/bc3-api/blob/master/sections/webhooks.md
        type: Documentation
      - url: asyncapi/basecamp-webhooks-asyncapi.yml
        type: AsyncAPI
    description: >-
      Basecamp Webhooks deliver real-time HTTP notifications when events occur within
      a project. Configure webhooks per project with an HTTPS payload URL and resource types.
  - aid: basecamp:basecamp-oauth
    name: Basecamp OAuth
    tags:
      - Authentication
      - Authorization
      - OAuth
      - Security
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://launchpad.37signals.com
    humanURL: https://github.com/basecamp/bc3-api/blob/master/sections/authentication.md
    properties:
      - url: https://github.com/basecamp/bc3-api/blob/master/sections/authentication.md
        type: Documentation
      - url: openapi/basecamp-oauth-openapi.yml
        type: OpenAPI
    description: >-
      OAuth 2.0 authentication for Basecamp API access via the 37signals Launchpad.
      Register at launchpad.37signals.com for a client ID and secret, then implement
      the authorization code flow to obtain access tokens.
